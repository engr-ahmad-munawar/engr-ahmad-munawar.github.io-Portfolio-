<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      margin: 0;
      padding: 0;
    }
    header {
      background: black;
      color: white;
      padding: 15px;
    }
    nav a {
      color: white;
      margin-right: 15px;
      text-decoration: none;
    }
    main {
      padding: 20px;
    }
  </style>
</head>

<body>

<header>
  <h2>{{ site.title }}</h2>
  <nav>
    {% for item in site.nav %}
      <a href="{{ item.link }}">{{ item.name }}</a>
    {% endfor %}
  </nav>
</header>

<main>
  {{ content }}
</main>

</body>
</html>
